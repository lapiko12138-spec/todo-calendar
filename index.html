<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人效率工具</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233f7d55'/%3E%3Cpath d='M18 24h28M18 33h20M18 42h28' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f4;
      --panel: #ffffff;
      --surface: #f8faf8;
      --line: #dde5df;
      --text: #1f2a24;
      --sub: #66756b;
      --green: #3f7d55;
      --green-strong: #2f6844;
      --blue: #4c73b7;
      --shadow: 0 12px 30px rgba(28, 45, 34, 0.08);
      --radius: 8px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      padding: 28px;
    }

    .wrap {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 780;
      letter-spacing: 0;
    }

    p {
      color: var(--sub);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .tool {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      color: inherit;
      text-decoration: none;
      min-height: 116px;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .tool:hover {
      transform: translateY(-2px);
      border-color: #bfceca;
      background: var(--surface);
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 820;
    }

    .finance .icon { background: var(--green); }
    .todo .icon { background: var(--blue); }

    .tool h2 {
      font-size: 1.04rem;
      font-weight: 760;
      margin-bottom: 3px;
    }

    .tool span {
      color: var(--sub);
      font-size: 0.84rem;
    }

    .arrow {
      color: var(--sub);
      font-size: 1.4rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }
      header {
        align-items: flex-start;
        flex-direction: column;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      .tool {
        grid-template-columns: auto minmax(0, 1fr);
      }
      .arrow {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>个人效率工具</h1>
        <p>本地保存数据，适合日常记账和待办复盘。</p>
      </div>
    </header>

    <section class="grid" aria-label="工具列表">
      <a class="tool finance" href="./finance-tracker.html">
        <div class="icon">¥</div>
        <div>
          <h2>智能记账本</h2>
          <span>收支流水、月预算、分类预算、资产账户和趋势分析</span>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="tool todo" href="./todolist/todo-calendar.html">
        <div class="icon">✓</div>
        <div>
          <h2>Todo 日历</h2>
          <span>按日期管理待办、优先级、拖拽排序和完成复盘</span>
        </div>
        <div class="arrow">›</div>
      </a>
    </section>
  </main>
</body>
</html>
