<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>📅 Todo 日历</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f0f4f8 0%,#e8eeff 100%);min-height:100vh;padding:24px 16px}
h1{font-size:22px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:8px}
.subtitle{font-size:12px;color:#94a3b8;margin-top:2px}
.topbar{display:flex;justify-content:space-between;align-items:center;max-width:960px;margin:0 auto 20px}
.legend{display:flex;gap:14px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:8px 14px;font-size:12px}
.legend span{display:flex;align-items:center;gap:4px;font-weight:600}
.btn-today{font-size:13px;padding:7px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;color:#475569;cursor:pointer;font-weight:500}
.btn-today:hover{background:#f8fafc}

/* Calendar */
.cal-wrap{max-width:960px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid #f1f5f9;overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9}
.cal-nav button{width:36px;height:36px;border:none;background:transparent;cursor:pointer;font-size:22px;color:#94a3b8;border-radius:10px;line-height:1}
.cal-nav button:hover{background:#f1f5f9;color:#475569}
.cal-title{text-align:center}
.cal-title .month{font-size:17px;font-weight:700;color:#1e293b}
.cal-title .stats{font-size:11px;color:#94a3b8;margin-top:2px}
.cal-title .stats b{color:#10b981}
.weekrow{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #f1f5f9}
.weekrow div{text-align:center;padding:8px 0;font-size:12px;font-weight:600;color:#64748b}
.weekrow div:first-child,.weekrow div:last-child{color:#f87171}
.grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;min-height:96px;padding:6px;cursor:pointer;transition:background .15s;position:relative}
.cell:nth-child(7n){border-right:none}
.cell:hover .day-num{background:#ede9fe}
.cell.out{background:#fafafa;cursor:default}
.cell.out .day-num{color:#d1d5db}
.cell.out:hover .day-num{background:transparent}
.day-num{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#374151;border-radius:50%;margin-bottom:4px}
.day-num.today{background:#6366f1;color:#fff}
.done-badge{position:absolute;top:6px;right:6px;width:16px;height:16px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.chip{font-size:11px;line-height:1.3;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left-width:3px;border-left-style:solid}
.chip.done{opacity:.4;text-decoration:line-through}
.more{font-size:10px;color:#94a3b8;padding-left:4px;font-weight:500}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-width:440px;max-height:85vh;display:flex;flex-direction:column}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 20px 16px;border-bottom:1px solid #f1f5f9}
.modal-head h2{font-size:17px;font-weight:700;color:#1e293b}
.modal-head .meta{font-size:12px;color:#94a3b8;margin-top:3px}
.close-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:20px;color:#94a3b8;border-radius:50%;line-height:1}
.close-btn:hover{background:#f1f5f9;color:#475569}
.add-area{padding:14px 20px;background:#f8fafc;border-bottom:1px solid #f1f5f9}
.priority-row{display:flex;gap:8px;margin-bottom:10px}
.p-btn{padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.p-btn.active{color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.input-row{display:flex;gap:8px}
.todo-input{flex:1;font-size:13px;border:1px solid #e2e8f0;border-radius:12px;padding:8px 12px;background:#fff;font-family:inherit;outline:none}
.todo-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.add-btn{padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer}
.add-btn:hover{background:#4f46e5}
.add-btn:disabled{opacity:.4;cursor:not-allowed}
.list-area{flex:1;overflow-y:auto;padding:16px 20px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0;color:#d1d5db}
.empty .icon{font-size:48px;margin-bottom:10px}
.empty p{font-size:13px}

/* Todo item */
.todo-item{border-radius:12px;margin-bottom:8px;overflow:hidden;border:1px solid;transition:opacity .15s}
.todo-item.dragging{opacity:.25}
.todo-item.over-top{box-shadow:0 -2px 0 #6366f1}
.todo-item.over-bot{box-shadow:0 2px 0 #6366f1}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 12px}
.drag-h{font-size:16px;color:#d1d5db;cursor:grab;user-select:none;flex-shrink:0;line-height:1}
.drag-h:active{cursor:grabbing}
.p-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff;flex-shrink:0}
.item-cb{width:15px;height:15px;cursor:pointer;flex-shrink:0;accent-color:#6366f1}
.item-text{flex:1;font-size:13px;line-height:1.4;word-break:break-all;color:#374151}
.item-text.done{text-decoration:line-through;color:#9ca3af}
.del-btn{background:transparent;border:none;cursor:pointer;font-size:20px;color:#d1d5db;flex-shrink:0;line-height:1;padding:0}
.del-btn:hover{color:#f87171}
.retro-box{padding:0 12px 12px}
.retro-label{font-size:11px;color:#94a3b8;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.retro-ta{width:100%;font-size:12px;border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px;font-family:inherit;color:#475569;background:#fff;outline:none;resize:vertical}
.retro-ta:focus{border-color:#a5b4fc;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.retro-ta::placeholder{color:#d1d5db}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
.footer{text-align:center;font-size:11px;color:#cbd5e1;margin-top:12px;max-width:960px;margin-left:auto;margin-right:auto}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>📅 Todo 日历</h1>
    <div class="subtitle">点击日期 · 管理待办 · 复盘记录</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="legend">
      <span style="color:#dc2626">🔴 P0</span>
      <span style="color:#ea580c">🟠 P1</span>
      <span style="color:#2563eb">🔵 P2</span>
    </div>
    <button class="btn-today" onclick="goToday()">今天</button>
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-nav">
    <button onclick="prevMonth()">‹</button>
    <div class="cal-title">
      <div class="month" id="cal-title"></div>
      <div class="stats" id="cal-stats"></div>
    </div>
    <button onclick="nextMonth()">›</button>
  </div>
  <div class="weekrow">
    <div>日</div><div>一</div><div>二</div><div>三</div>
    <div>四</div><div>五</div><div>六</div>
  </div>
  <div class="grid" id="cal-grid"></div>
</div>

<div class="footer">数据保存在本地浏览器 · 清除缓存会丢失数据</div>

<!-- Modal -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modal-title"></h2>
        <div class="meta" id="modal-meta"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="add-area">
      <div class="priority-row" id="priority-row"></div>
      <div class="input-row">
        <input class="todo-input" id="todo-input" placeholder="输入待办，Enter 快速添加…"
               oninput="toggleAddBtn()" onkeydown="inputKeydown(event)"/>
        <button class="add-btn" id="add-btn" onclick="addTodo()" disabled>添加</button>
      </div>
    </div>
    <div class="list-area" id="list-area"></div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────
const P = {
  P0:{key:'P0',label:'P0',emoji:'🔴',hex:'#ef4444',bg:'#fef2f2',border:'#fca5a5',text:'#dc2626'},
  P1:{key:'P1',label:'P1',emoji:'🟠',hex:'#f97316',bg:'#fff7ed',border:'#fdba74',text:'#ea580c'},
  P2:{key:'P2',label:'P2',emoji:'🔵',hex:'#3b82f6',bg:'#eff6ff',border:'#93c5fd',text:'#2563eb'},
};
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// ── State ──────────────────────────────────────────────────────────
let now=new Date(), curYear=now.getFullYear(), curMonth=now.getMonth();
let todos=loadData();
let modalDk=null, selPriority='P2', dragIdx=null, overIdx=null;

// ── Storage ────────────────────────────────────────────────────────
function loadData(){try{return JSON.parse(localStorage.getItem('todo-cal-v2')||'{}')}catch{return{}}}
function saveData(){localStorage.setItem('todo-cal-v2',JSON.stringify(todos))}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function todayKey(){return dateKey(now.getFullYear(),now.getMonth(),now.getDate())}

// ── Calendar ───────────────────────────────────────────────────────
function renderCalendar(){
  const firstWd=new Date(curYear,curMonth,1).getDay();
  const daysInCur=new Date(curYear,curMonth+1,0).getDate();
  const daysInPrev=new Date(curYear,curMonth,0).getDate();
  const prevY=curMonth===0?curYear-1:curYear, prevM=curMonth===0?11:curMonth-1;
  const nextY=curMonth===11?curYear+1:curYear, nextM=curMonth===11?0:curMonth+1;

  document.getElementById('cal-title').textContent=`${curYear} · ${MONTHS[curMonth]}`;

  // stats
  const cells=[];
  for(let i=firstWd-1;i>=0;i--) cells.push({day:daysInPrev-i,dk:dateKey(prevY,prevM,daysInPrev-i),in:false});
  for(let d=1;d<=daysInCur;d++) cells.push({day:d,dk:dateKey(curYear,curMonth,d),in:true});
  for(let d=1;cells.length<42;d++) cells.push({day:d,dk:dateKey(nextY,nextM,d),in:false});

  const mKeys=cells.filter(c=>c.in).map(c=>c.dk);
  const total=mKeys.reduce((s,k)=>s+(todos[k]?.length||0),0);
  const done=mKeys.reduce((s,k)=>s+(todos[k]?.filter(t=>t.done).length||0),0);
  const statsEl=document.getElementById('cal-stats');
  if(total>0){
    statsEl.innerHTML=`本月 ${total} 项 · 完成 ${done} 项 <b>${Math.round(done/total*100)}%</b>`;
  } else { statsEl.textContent=''; }

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const tk=todayKey();
  cells.forEach(c=>{
    const list=todos[c.dk]||[];
    const allDone=list.length>0&&list.every(t=>t.done);
    const div=document.createElement('div');
    div.className='cell'+(c.in?'':' out');
    if(c.in) div.onclick=()=>openModal(c.dk,`${curYear}年${curMonth+1}月${c.day}日`);

    let html=`<div class="day-num${c.dk===tk?' today':''}">${c.day}</div>`;
    if(allDone) html+=`<div class="done-badge">✓</div>`;
    list.slice(0,3).forEach(t=>{
      const p=P[t.priority]||P.P2;
      html+=`<div class="chip${t.done?' done':''}" title="${esc(t.content)}"
        style="background:${p.bg};color:${p.text};border-left-color:${p.hex}">${esc(t.content)}</div>`;
    });
    if(list.length>3) html+=`<div class="more">+${list.length-3} 项</div>`;
    div.innerHTML=html;
    grid.appendChild(div);
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function prevMonth(){if(curMonth===0){curYear--;curMonth=11}else curMonth--;renderCalendar()}
function nextMonth(){if(curMonth===11){curYear++;curMonth=0}else curMonth++;renderCalendar()}
function goToday(){curYear=now.getFullYear();curMonth=now.getMonth();renderCalendar()}

// ── Modal ──────────────────────────────────────────────────────────
function openModal(dk,label){
  modalDk=dk; selPriority='P2';
  document.getElementById('modal-title').textContent=label;
  document.getElementById('todo-input').value='';
  document.getElementById('add-btn').disabled=true;
  renderPriorityBtns();
  renderList();
  updateMeta();
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('todo-input').focus(),50);
}

function closeModal(){
  document.getElementById('overlay').style.display='none';
  modalDk=null; renderCalendar();
}

function overlayClick(e){if(e.target===document.getElementById('overlay')) closeModal();}

document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});

function updateMeta(){
  const list=todos[modalDk]||[];
  const done=list.filter(t=>t.done).length;
  document.getElementById('modal-meta').textContent=
    list.length===0?'暂无待办':`${list.length} 项待办 · 已完成 ${done} 项`;
}

function renderPriorityBtns(){
  const row=document.getElementById('priority-row');
  row.innerHTML='';
  Object.values(P).forEach(p=>{
    const btn=document.createElement('button');
    btn.className='p-btn'+(selPriority===p.key?' active':'');
    btn.innerHTML=`${p.emoji} ${p.label}`;
    if(selPriority===p.key) btn.style.background=p.hex;
    btn.onclick=()=>{selPriority=p.key;renderPriorityBtns()};
    row.appendChild(btn);
  });
}

function toggleAddBtn(){
  document.getElementById('add-btn').disabled=!document.getElementById('todo-input').value.trim();
}

function inputKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTodo();}}

function addTodo(){
  const text=document.getElementById('todo-input').value.trim();
  if(!text) return;
  if(!todos[modalDk]) todos[modalDk]=[];
  todos[modalDk].push({id:uid(),content:text,priority:selPriority,done:false,retro:''});
  saveData();
  document.getElementById('todo-input').value='';
  document.getElementById('add-btn').disabled=true;
  document.getElementById('todo-input').focus();
  renderList(); updateMeta();
}

// ── List render ────────────────────────────────────────────────────
function renderList(){
  const list=todos[modalDk]||[];
  const area=document.getElementById('list-area');
  if(list.length===0){
    area.innerHTML='<div class="empty"><div class="icon">📋</div><p>还没有待办，快来添加吧~</p></div>';
    return;
  }
  area.innerHTML='';
  list.forEach((t,i)=>area.appendChild(makeItem(t,i)));
}

function makeItem(t,i){
  const p=P[t.priority]||P.P2;
  const wrap=document.createElement('div');
  wrap.className='todo-item';
  wrap.style.borderColor=p.border;
  wrap.style.background=p.bg;
  wrap.draggable=true;
  wrap.dataset.idx=i;

  // drag events
  wrap.addEventListener('dragstart',e=>{e.dataTransfer.effectAllowed='move';dragIdx=i;wrap.classList.add('dragging');});
  wrap.addEventListener('dragend',()=>{dragIdx=null;overIdx=null;renderList();});
  wrap.addEventListener('dragenter',e=>{e.preventDefault();if(dragIdx===null||dragIdx===i) return;
    overIdx=i;
    document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('over-top','over-bot'));
    wrap.classList.add(i<=dragIdx?'over-top':'over-bot');
  });
  wrap.addEventListener('dragover',e=>e.preventDefault());
  wrap.addEventListener('drop',e=>{
    e.preventDefault();
    if(dragIdx===null||dragIdx===i) return;
    const list=todos[modalDk]||[];
    const arr=[...list]; const [item]=arr.splice(dragIdx,1); arr.splice(i,0,item);
    todos[modalDk]=arr; saveData(); dragIdx=null; overIdx=null; renderList(); updateMeta();
  });

  // row
  const row=document.createElement('div');
  row.className='item-row';
  row.innerHTML=`
    <span class="drag-h" title="拖动排序">⠿</span>
    <span class="p-badge" style="background:${p.hex}">${p.label}</span>
    <input type="checkbox" class="item-cb" ${t.done?'checked':''} />
    <span class="item-text${t.done?' done':''}">${esc(t.content)}</span>
    <button class="del-btn" title="删除">×</button>
  `;
  row.querySelector('.item-cb').addEventListener('change',()=>{
    todos[modalDk][i].done=!todos[modalDk][i].done;
    saveData(); renderList(); updateMeta();
  });
  row.querySelector('.del-btn').addEventListener('click',()=>{
    todos[modalDk].splice(i,1);
    if(!todos[modalDk].length) delete todos[modalDk];
    saveData(); renderList(); updateMeta();
  });
  wrap.appendChild(row);

  // retro
  if(t.done){
    const retro=document.createElement('div');
    retro.className='retro-box';
    retro.innerHTML=`
      <div class="retro-label">📝 复盘记录</div>
      <textarea class="retro-ta" rows="2" placeholder="记录结果、收获或下次改进点…">${esc(t.retro||'')}</textarea>
    `;
    retro.querySelector('textarea').addEventListener('input',e=>{
      todos[modalDk][i].retro=e.target.value; saveData();
    });
    wrap.appendChild(retro);
  }

  return wrap;
}

// ── Init ───────────────────────────────────────────────────────────
renderCalendar();
</script>
</body>
</html>
